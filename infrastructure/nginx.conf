# NGINX API Gateway + Load Balancer
# AI-Driven Solar Inverter Failure Prediction Platform

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Upstream: Main Backend Server (load balanced)
    upstream main_server {
        least_conn;
        server main-server:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Upstream: ML Prediction Server
    upstream ml_server {
        least_conn;
        server ml-server:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Upstream: LLM Service
    # upstream llm_service {
    #     least_conn;
    #     server llm-service:8001 max_fails=3 fail_timeout=30s;
    #     keepalive 32;
    # }

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Health check endpoint for gateway
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Frontend (React) - static assets
        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Main server API
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://main_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ML server API (predict, train, models)
        location /ml/ {
            rewrite ^/ml/(.*) /$1 break;
            proxy_pass http://ml_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # LLM service API (explain, ask)
        # location /llm/ {
        #     rewrite ^/llm/(.*) /$1 break;
        #     # proxy_pass http://llm_service;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_connect_timeout 30s;
        #     proxy_send_timeout 120s;
        #     proxy_read_timeout 120s;
        # }
    }
}
