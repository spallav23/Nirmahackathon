# AI-Driven Solar Inverter Failure Prediction & Intelligence Platform
# Main orchestration file - all services support horizontal scaling

services:
  # ---------------------------------------------------------------------------
  # NGINX API Gateway + Load Balancer
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      main-server:
        condition: service_healthy
      # ml-server:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      replicas: 1

  # ---------------------------------------------------------------------------
  # Main Backend Server (Node.js + Express)
  # ---------------------------------------------------------------------------
  main-server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: main-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/inverter_platform
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREDICTIONS: ${KAFKA_TOPIC_PREDICTIONS:-prediction_events}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
    #   interval: 20s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 15s
    deploy:
      replicas: 1

  # ---------------------------------------------------------------------------
  # ML Prediction Server (Python + FastAPI)
  # ---------------------------------------------------------------------------
  # ml-server:
  #   build:
  #     context: ../ml_server
  #     dockerfile: Dockerfile
  #   container_name: ml-server
  #   restart: unless-stopped
  #   environment:
  #     REDIS_URL: redis://redis:6379
  #     KAFKA_BROKERS: kafka:9092
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     kafka:
  #       condition: service_started
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 20s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 20s
  #   deploy:
  #     replicas: 1

  # ---------------------------------------------------------------------------
  # SMTP Notification Service
  # ---------------------------------------------------------------------------
  notification-service:
    build:
      context: ../smtp_server
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC_NOTIFICATIONS: ${KAFKA_TOPIC_NOTIFICATIONS:-notification_events}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
    depends_on:
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1

  # ---------------------------------------------------------------------------
  # Redis Feature Store
  # ---------------------------------------------------------------------------
  redis:
    build:
      context: ../redis
      dockerfile: Dockerfile
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      replicas: 1

  # ---------------------------------------------------------------------------
  # MongoDB (centralized database)
  # ---------------------------------------------------------------------------
  mongodb:
    build:
      context: ../database
      dockerfile: Dockerfile
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: inverter_platform
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      replicas: 1

  # ---------------------------------------------------------------------------
  # Apache Kafka Event Bus
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    build:
      context: ../kafka
      dockerfile: Dockerfile
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1

volumes:
  mongodb_data:
  zookeeper_data:

networks:
  default:
    name: inverter-platform-network
